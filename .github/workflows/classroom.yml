name: Autograder

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v6
    
    - name: Setup Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.13'
    
    - name: Instalar dependencias
      run: |
        python -m pip install --upgrade pip
        pip install pytest pytest-cov pytest-html pytest-xdist
    
    - name: Verificar envío de estudiantes
      run: |
        if [ ! -f "album_figus.py" ]; then
          echo "::error::No se encontró album_figus.py"
          exit 1
        fi
    
    - name: Verificar estructura de pruebas
      run: |
        if [ ! -f "tests/test_album_figus.py" ]; then
          echo "::error::No se encontró tests/test_album_figus.py"
          exit 1
        fi
    
    - name: Correr los casos de prueba con pytest
      id: tests
      run: |
        pytest tests/test_album_figus.py -v \
          --tb=short \
          --maxfail=10 \
          --strict-markers \
          --disable-warnings \
        | tee tests/test_results.txt
      continue-on-error: true
    
    - name: Correr pruebas con cobertura
      run: |
        pytest tests/test_album_figus.py -v \
          --cov=album_figus \
          --cov-report=term-missing \
          --cov-report=html \
          --cov-report=xml \
          --cov-branch
    
    - name: Generar reporte HTML
      run: |
        pytest tests/test_album_figus.py --html=tests/test_report.html --self-contained-html
      continue-on-error: true
    
    - name: Contar pruebas pasadas y fallidas
      run: |
        echo "## Resumen de pruebas" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        pytest tests/test_album_figus.py --collect-only -q | grep -c "test" > /tmp/total_tests || true
        total=$(cat /tmp/total_tests)
        echo "Total de pruebas: $total" >> $GITHUB_STEP_SUMMARY
        echo "Ver resultados completos en los artefactos" >> $GITHUB_STEP_SUMMARY
    
    - name: Subir resultados de casos de prueba
      if: always()
      uses: actions/upload-artifact@v7
      with:
        name: test-results
        path: |
          tests/test_results.txt
          tests/test_report.html
          htmlcov/
          coverage.xml
    
    - name: Verificar porcentaje de cobertura mínimo
      if: always()
      run: |
        if [ -f coverage.xml ]; then
          COVERAGE=$(python -c "import xml.etree.ElementTree as ET; tree=ET.parse('coverage.xml'); root=tree.getroot(); print(float(root.attrib.get('line-rate', 0))*100)")
          echo "Cobertura de código: ${COVERAGE}%"
          MIN_COVERAGE=70
          if (( $(echo "$COVERAGE < $MIN_COVERAGE" | bc -l) )); then
            echo "::warning::La cobertura de código (${COVERAGE}%) es menor al mínimo requerido (${MIN_COVERAGE}%)"
          fi
        fi
    
    - name: Determinar resultado final
      if: always()
      run: |
        if grep -q "FAILED" tests/test_results.txt; then
          echo "::warning::Algunas pruebas fallaron. Revisa los resultados."
          exit 1
        else
          echo "✅ Todas las pruebas pasaron exitosamente"
        fi